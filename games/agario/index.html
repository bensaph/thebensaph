<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agar.io Clone</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; overflow: hidden; font-family: Arial, sans-serif; }
canvas { display: block; cursor: none; }
#ui {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
#start-screen {
  text-align: center; color: #fff; pointer-events: auto;
}
#start-screen h1 { font-size: 48px; margin-bottom: 20px; }
#start-screen input {
  padding: 10px 20px; font-size: 18px; border: none; border-radius: 4px;
  margin-bottom: 15px; width: 250px; text-align: center; outline: none;
}
#start-screen button {
  display: block; margin: 0 auto; padding: 12px 40px; font-size: 20px;
  border: none; border-radius: 4px; background: #4CAF50; color: #fff;
  cursor: pointer;
}
#start-screen button:hover { background: #45a049; }
#hud {
  position: absolute; top: 10px; left: 10px; color: #fff;
  font-size: 14px; pointer-events: none;
}
#leaderboard {
  position: absolute; top: 10px; right: 10px; color: #fff;
  font-size: 13px; background: rgba(0,0,0,0.5); padding: 10px 15px;
  border-radius: 6px; pointer-events: none; min-width: 150px;
}
#leaderboard h3 { margin-bottom: 6px; font-size: 15px; text-align: center; }
#leaderboard ol { padding-left: 20px; }
#leaderboard li { margin: 2px 0; }
#leaderboard .me { color: #4CAF50; font-weight: bold; }
.hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="start-screen">
    <h1>🟢 Agar.io</h1>
    <input id="name-input" type="text" placeholder="Enter your name" maxlength="15" autofocus>
    <br>
    <button id="play-btn">Play</button>
  </div>
</div>
<div id="hud" class="hidden">
  <div>Score: <span id="score">0</span></div>
  <div>Mass: <span id="mass">10</span></div>
</div>
<div id="leaderboard" class="hidden">
  <h3>Leaderboard</h3>
  <ol id="lb-list"></ol>
</div>
<script src="game.js"></script>
</body>
</html>
